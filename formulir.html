<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Pemesanan - Kendari</title>
<link rel="stylesheet" href="style.css">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.form-container {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 15px;
    width: 350px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.form-container h2 {
    text-align: center;
    margin-bottom: 20px;
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    font-size: 14px;
}

.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: none;
    border-radius: 8px;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: linear-gradient(45deg, #0ea5e9, #22c55e);
    color: white;
    font-weight: bold;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}


</style>
</head>

<body>

<div class="form-container">
    <h2>Booking Wisata Kendari</h2>

    <form>
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" required>
        </div>

        <div class="form-group">
            <label>No HP</label>
            <input type="tel" required>
        </div>

        <div class="form-group">
            <label>Paket Wisata</label>
            <select>
                <option>Pulau Bokori</option>
                <option>Pantai Nambo</option>
                <option>Teluk kendari</option>
                 <option>tantai toronipa</option>
            </select>
        </div>

        <div class="form-group">
            <label>Jumlah Orang</label>
            <input type="number">
        </div>

        <div class="form-group">
            <label>Tanggal</label>
            <input type="date">
        </div>

        <div class="form-group">
            <label>Catatan</label>
            <textarea rows="3"></textarea>
        </div>

        <button type="submit">Kirim Pesanan</button>
    </form>
</div>

<div style="text-align:center; margin-top:40px;">
    <a href="index.html" class="btn">kembali</a>
</div>

</body>
</html>
